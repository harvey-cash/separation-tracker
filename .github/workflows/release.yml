name: App Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Stage hosted site output
        run: |
          mkdir -p site-dist
          mkdir -p site-dist/app
          mkdir -p site-dist/streamer
          cp -r apps/brave-paws-landing/dist/* site-dist/
          cp -r apps/brave-paws-app/dist/* site-dist/app/
          cp -r apps/brave-paws-streamer/windows-camera-helper-ui/public/* site-dist/streamer/
      - name: Archive build output
        run: cd site-dist && zip -r ../dist.zip .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: dist.zip
          generate_release_notes: true
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site-dist/

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: site-dist/
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: harvey-cash/harvey-cash.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: website
      - name: Update site files
        run: |
          mkdir -p website/separation
          rm -rf website/separation/assets
          rm -rf website/separation/app
          rm -rf website/separation/streamer
          mkdir -p website/separation/app
          mkdir -p website/separation/streamer
          find website/separation -maxdepth 1 -type f -delete
          cp -r site-dist/*.html website/separation/
          cp -r site-dist/assets website/separation/
          cp -r site-dist/app/* website/separation/app/
          cp -r site-dist/streamer/* website/separation/streamer/
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: website
          branch: deploy/separation-${{ github.event.inputs.version }}
          title: "Deploy separation-tracker ${{ github.event.inputs.version }}"
          body: |
            Automated deployment of separation-tracker ${{ github.event.inputs.version }} to `/separation/`, `/separation/app/`, and `/separation/streamer/`.
          commit-message: "deploy separation-tracker ${{ github.event.inputs.version }}"
