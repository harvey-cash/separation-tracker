name: CD

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      - run: npm run build
      - name: Stage hosted site output
        run: |
          mkdir -p site-dist
          mkdir -p site-dist/app
          cp -r apps/brave-paws-landing/dist/* site-dist/
          cp -r apps/brave-paws-app/dist/* site-dist/app/
      - name: Archive build output
        run: cd site-dist && zip -r ../dist.zip .
      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push
      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: dist.zip
          generate_release_notes: true
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site-dist/

  deploy:
    needs: release
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: site-dist/
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: harvey-cash/harvey-cash.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: website
      - name: Update site files
        run: |
          mkdir -p website/separation
          rm -rf website/separation/assets
          rm -rf website/separation/app
          mkdir -p website/separation/app
          find website/separation -maxdepth 1 -type f -delete
          cp -r site-dist/*.html website/separation/
          cp -r site-dist/assets website/separation/
          cp -r site-dist/app/* website/separation/app/
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: website
          branch: deploy/separation-${{ needs.release.outputs.version }}
          title: "Deploy separation-tracker ${{ needs.release.outputs.version }}"
          body: |
            Automated deployment of separation-tracker ${{ needs.release.outputs.version }} to `/separation/` and `/separation/app/`.
          commit-message: "deploy separation-tracker ${{ needs.release.outputs.version }}"
